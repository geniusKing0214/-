{% extends "base.html" %}

{% block title %}로그인 | HAN Scheduler{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card">
        <span class="auth-badge">LOGIN</span>
        <h1 class="page-title">구글 로그인</h1>
        <p class="page-desc">
            구글 계정으로 로그인하면 일정 신청과 관리자 기능을 사용할 수 있습니다.
        </p>

        <button id="googleLoginBtn" class="btn auth-btn" type="button">구글로 로그인</button>
        <div id="loginMsg" class="login-msg"></div>

        <div class="auth-divider"></div>

        <p class="auth-subtext">처음 이용하는 경우 회원가입 화면에서도 같은 방식으로 시작할 수 있습니다.</p>
        <a class="btn btn-outline auth-link-btn" href="/register">회원가입으로 이동</a>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "{{ firebase_api_key }}",
        authDomain: "{{ firebase_auth_domain }}",
        projectId: "{{ firebase_project_id }}",
        storageBucket: "{{ firebase_storage_bucket }}",
        messagingSenderId: "{{ firebase_messaging_sender_id }}",
        appId: "{{ firebase_app_id }}"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("googleLoginBtn");
    const loginMsg = document.getElementById("loginMsg");

    loginBtn.addEventListener("click", async () => {
        loginMsg.textContent = "";

        try {
            const result = await signInWithPopup(auth, provider);
            const idToken = await result.user.getIdToken();

            const response = await fetch("/session/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ idToken })
            });

            if (!response.ok) {
                throw new Error("서버 세션 생성에 실패했습니다.");
            }

            window.location.href = "/";
        } catch (error) {
            console.error(error);
            loginMsg.textContent = "로그인 중 오류가 발생했습니다. 다시 시도해주세요.";
        }
    });
</script>
{% endblock %}
